apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: arc-api-manager
rules:
  # Namespace management
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create", "delete"]

  # Secrets (PostgreSQL credentials + replication passwords)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch", "delete"]

  # ConfigMaps (initdb scripts, replication config)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "patch", "delete"]

  # PersistentVolumeClaims (data, WAL archive, backup)
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "create", "delete"]

  # Services (ClusterIP + NodePort/LoadBalancer)
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "create", "patch", "delete"]

  # Pods (readiness checks)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]

  # StatefulSets (primary, replicas, restored instances)
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "create", "patch", "delete"]

  # Jobs (pg_basebackup backup jobs)
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "delete"]

  # Metrics server (metering / scale-to-zero idle detection)
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
