<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ServerlessDB — Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f;
      --surface: #1c1c1c;
      --surface2: #222;
      --border: #2a2a2a;
      --green: #3ecf8e;
      --green-dim: rgba(62,207,142,.1);
      --text: #ededed;
      --muted: #8c8c8c;
      --danger: #e55353;
      --warning: #f59e0b;
      --radius: 6px;
      --sidebar: 220px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }

    /* Sidebar */
    .sidebar { width: var(--sidebar); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; }
    .sidebar-logo { display: flex; align-items: center; gap: 9px; padding: 18px 16px; border-bottom: 1px solid var(--border); }
    .sidebar-logo svg { color: var(--green); flex-shrink: 0; }
    .sidebar-logo-text { font-size: .95rem; font-weight: 700; letter-spacing: -.2px; }
    .sidebar-nav { flex: 1; padding: 12px 8px; }
    .nav-section { font-size: .7rem; color: var(--muted); letter-spacing: .08em; padding: 12px 8px 6px; text-transform: uppercase; }
    .nav-item { display: flex; align-items: center; gap: 9px; padding: 7px 10px; border-radius: var(--radius); font-size: .85rem; color: var(--muted); cursor: pointer; text-decoration: none; transition: background .1s, color .1s; }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: var(--green-dim); color: var(--green); }
    .nav-item svg { flex-shrink: 0; }
    .sidebar-footer { padding: 12px 8px; border-top: 1px solid var(--border); }
    .user-row { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: var(--radius); cursor: pointer; }
    .user-row:hover { background: var(--surface2); }
    .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--green-dim); border: 1px solid var(--green); display: flex; align-items: center; justify-content: center; font-size: .75rem; font-weight: 600; color: var(--green); flex-shrink: 0; }
    .user-info { flex: 1; min-width: 0; }
    .user-email { font-size: .78rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sign-out { font-size: .75rem; color: var(--muted); }

    /* Main */
    .main { margin-left: var(--sidebar); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
    .topbar { padding: 16px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .page-title { font-size: 1rem; font-weight: 600; }
    .page-sub { font-size: .8rem; color: var(--muted); margin-top: 2px; }
    .content { padding: 28px; flex: 1; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border: none; border-radius: var(--radius); font-size: .8rem; font-weight: 500; cursor: pointer; transition: opacity .15s; }
    .btn-green { background: var(--green); color: #000; }
    .btn-green:hover { opacity: .88; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { border-color: #555; }
    .btn-ghost { background: transparent; color: var(--muted); }
    .btn-ghost:hover { color: var(--text); }
    .btn-danger { background: rgba(229,83,83,.12); border: 1px solid rgba(229,83,83,.25); color: var(--danger); }
    .btn-danger:hover { background: rgba(229,83,83,.2); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    /* Table card */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .card-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .card-title { font-size: .9rem; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; font-size: .82rem; }
    th { text-align: left; color: var(--muted); font-weight: 500; padding: 10px 20px; border-bottom: 1px solid var(--border); font-size: .75rem; letter-spacing: .04em; text-transform: uppercase; }
    td { padding: 13px 20px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.015); }
    .inst-name { font-weight: 500; }
    .inst-slug { font-size: .75rem; color: var(--muted); margin-top: 2px; font-family: monospace; }

    /* Badges */
    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 999px; font-size: .72rem; font-weight: 600; }
    .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .badge-running { background: rgba(62,207,142,.12); color: var(--green); }
    .badge-provisioning { background: rgba(245,158,11,.12); color: var(--warning); }
    .badge-error { background: rgba(229,83,83,.12); color: var(--danger); }
    .badge-deleting { background: rgba(140,140,140,.12); color: var(--muted); }
    .badge-deleted { background: rgba(140,140,140,.08); color: var(--muted); }

    /* Empty */
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty svg { margin: 0 auto 12px; opacity: .3; display: block; }
    .empty p { font-size: .875rem; }

    /* Modal */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 50; align-items: center; justify-content: center; padding: 20px; }
    .overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; width: 100%; max-width: 480px; }
    .modal-head { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid var(--border); }
    .modal-head h3 { font-size: .95rem; font-weight: 600; }
    .modal-body { padding: 20px; }
    .modal-foot { display: flex; gap: 8px; justify-content: flex-end; padding: 16px 20px; border-top: 1px solid var(--border); }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: .75rem; color: var(--muted); margin-bottom: 6px; letter-spacing: .04em; text-transform: uppercase; }
    input, select { width: 100%; padding: 8px 10px; background: #111; border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: .85rem; outline: none; transition: border-color .15s; }
    input:focus, select:focus { border-color: var(--green); }
    .alert { padding: 10px 12px; border-radius: var(--radius); font-size: .8rem; margin-bottom: 16px; background: rgba(229,83,83,.1); border: 1px solid rgba(229,83,83,.25); color: var(--danger); }

    /* Credentials panel */
    .creds-note { font-size: .8rem; color: var(--warning); background: rgba(245,158,11,.08); border: 1px solid rgba(245,158,11,.2); border-radius: var(--radius); padding: 10px 12px; margin-bottom: 16px; }
    .cred-row { margin-bottom: 12px; }
    .cred-label { font-size: .72rem; color: var(--muted); letter-spacing: .04em; text-transform: uppercase; margin-bottom: 5px; }
    .cred-val { display: flex; align-items: stretch; gap: 0; }
    .cred-text {
      flex: 1;
      background: #111;
      border: 1px solid var(--border);
      border-right: none;
      border-radius: var(--radius) 0 0 var(--radius);
      padding: 8px 10px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: .78rem;
      color: var(--text);
      word-break: break-all;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
      min-height: 36px;
      line-height: 1.5;
    }
    .copy-btn {
      flex-shrink: 0;
      width: 72px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: none;
      border-radius: 0 var(--radius) var(--radius) 0;
      color: var(--muted);
      font-size: .75rem;
      cursor: pointer;
      transition: background .15s, color .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .copy-btn:hover { background: #333; color: var(--text); }
    .copy-btn.copied { background: var(--green-dim); color: var(--green); border-color: rgba(62,207,142,.3); }

    .hidden { display: none; }
    .actions { display: flex; gap: 6px; justify-content: flex-end; }
  </style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14a9 3 0 0 0 18 0V5"/><path d="M3 12a9 3 0 0 0 18 0"/>
    </svg>
    <span class="sidebar-logo-text">ServerlessDB</span>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">Project</div>
    <a class="nav-item active" href="/ui/app">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      Database
    </a>
    <a class="nav-item" href="/ui/billing">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
      Billing
    </a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-row" onclick="doLogout()">
      <div class="avatar" id="avatar-initials">?</div>
      <div class="user-info">
        <div class="user-email" id="user-email">Loading...</div>
        <div class="sign-out">Sign out</div>
      </div>
    </div>
  </div>
</aside>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <div>
      <div class="page-title">Database Instances</div>
      <div class="page-sub">Manage your PostgreSQL instances</div>
    </div>
    <button type="button" class="btn btn-green" onclick="openCreate()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New instance
    </button>
  </div>
  <div class="content">
    <div class="card">
      <div id="table-wrap"><div class="empty"><p>Loading...</p></div></div>
    </div>
  </div>
</div>

<!-- Create modal -->
<div class="overlay" id="create-modal">
  <div class="modal">
    <div class="modal-head">
      <h3>Create instance</h3>
      <button type="button" class="btn btn-ghost" onclick="closeCreate()">✕</button>
    </div>
    <div class="modal-body">
      <div id="create-alert" class="alert hidden"></div>
      <div class="form-group"><label for="i-name">Instance name</label><input id="i-name" type="text" placeholder="my-db" /></div>
      <div class="form-group"><label for="i-ver">PostgreSQL version</label>
        <select id="i-ver"><option value="16">16</option><option value="15">15</option><option value="14">14</option></select>
      </div>
      <div class="form-group"><label for="i-user">Username</label><input id="i-user" type="text" value="pguser" /></div>
      <div class="form-group"><label for="i-db">Database name</label><input id="i-db" type="text" value="postgres" /></div>
      <div class="form-group"><label for="i-storage">Storage</label>
        <select id="i-storage"><option value="1Gi">1 GiB</option><option value="5Gi" selected>5 GiB</option><option value="10Gi">10 GiB</option><option value="20Gi">20 GiB</option></select>
      </div>
    </div>
    <div class="modal-foot">
      <button type="button" class="btn btn-outline" onclick="closeCreate()">Cancel</button>
      <button type="button" class="btn btn-green" id="create-btn" onclick="createInstance()">Create instance</button>
    </div>
  </div>
</div>

<!-- Credentials modal -->
<div class="overlay" id="creds-modal">
  <div class="modal">
    <div class="modal-head">
      <h3>Connection details</h3>
      <button type="button" class="btn btn-ghost" onclick="closeCreds()">✕</button>
    </div>
    <div class="modal-body">
      <div class="creds-note">Save your password now — it will not be shown again. Click any field to copy it.</div>
      <div class="cred-row">
        <div class="cred-label">Connection string</div>
        <div class="cred-val">
          <div class="cred-text" id="c-connstr"></div>
          <button type="button" class="copy-btn" onclick="copyField('c-connstr', this)">Copy</button>
        </div>
      </div>
      <div class="cred-row">
        <div class="cred-label">Host</div>
        <div class="cred-val">
          <div class="cred-text" id="c-host"></div>
          <button type="button" class="copy-btn" onclick="copyField('c-host', this)">Copy</button>
        </div>
      </div>
      <div class="cred-row">
        <div class="cred-label">Port</div>
        <div class="cred-val">
          <div class="cred-text" id="c-port"></div>
          <button type="button" class="copy-btn" onclick="copyField('c-port', this)">Copy</button>
        </div>
      </div>
      <div class="cred-row">
        <div class="cred-label">Username</div>
        <div class="cred-val">
          <div class="cred-text" id="c-user"></div>
          <button type="button" class="copy-btn" onclick="copyField('c-user', this)">Copy</button>
        </div>
      </div>
      <div class="cred-row">
        <div class="cred-label">Password</div>
        <div class="cred-val">
          <div class="cred-text" id="c-pass"></div>
          <button type="button" class="copy-btn" onclick="copyField('c-pass', this)">Copy</button>
        </div>
      </div>
      <div class="cred-row">
        <div class="cred-label">Database</div>
        <div class="cred-val">
          <div class="cred-text" id="c-db"></div>
          <button type="button" class="copy-btn" onclick="copyField('c-db', this)">Copy</button>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button type="button" class="btn btn-green" onclick="closeCreds()">Done</button>
    </div>
  </div>
</div>

<script>
  const API = '';
  if (!localStorage.getItem('access_token')) location.href = '/ui/';

  async function api(path, opts = {}) {
    const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('access_token')}`, ...opts.headers };
    const r = await fetch(API + path, { ...opts, headers });
    if (r.status === 401) { localStorage.clear(); location.href = '/ui/'; return; }
    if (r.status === 204) return null;
    return r.json();
  }

  let pollTimers = {};

  // Load user info
  api('/users/me').then(u => {
    if (!u) return;
    document.getElementById('user-email').textContent = u.email;
    document.getElementById('avatar-initials').textContent = u.full_name ? u.full_name[0].toUpperCase() : u.email[0].toUpperCase();
  });

  async function load() {
    const list = await api('/instances');
    if (!list) return;
    const wrap = document.getElementById('table-wrap');
    if (!list.length) {
      wrap.innerHTML = `<div class="empty">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14a9 3 0 0 0 18 0V5"/><path d="M3 12a9 3 0 0 0 18 0"/></svg>
        <p>No instances yet</p></div>`;
      return;
    }
    wrap.innerHTML = `<table>
      <thead><tr><th>Name</th><th>Status</th><th>Version</th><th>Host</th><th>Port</th><th>Created</th><th></th></tr></thead>
      <tbody>${list.map(row).join('')}</tbody>
    </table>`;
    list.forEach(i => { if (i.status === 'provisioning' || i.status === 'deleting') poll(i.id); });
  }

  function row(i) {
    const created = new Date(i.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    const actions = [
      i.status === 'running' ? `<button type="button" class="btn btn-outline" onclick="rotate('${i.id}')">Rotate creds</button>` : '',
      i.status !== 'deleting' && i.status !== 'deleted' ? `<button type="button" class="btn btn-danger" onclick="del('${i.id}','${i.name}')">Delete</button>` : '',
    ].filter(Boolean).join('');
    return `<tr id="row-${i.id}">
      <td><div class="inst-name">${i.name}</div><div class="inst-slug">${i.slug}</div></td>
      <td><span class="badge badge-${i.status}">${i.status}</span></td>
      <td>PG ${i.pg_version}</td>
      <td>${i.external_host || '—'}</td>
      <td>${i.external_port || '—'}</td>
      <td>${created}</td>
      <td><div class="actions">${actions}</div></td>
    </tr>`;
  }

  function poll(id) {
    if (pollTimers[id]) return;
    pollTimers[id] = setInterval(async () => {
      const s = await api(`/instances/${id}/status`);
      if (!s || (s.status !== 'provisioning' && s.status !== 'deleting')) {
        clearInterval(pollTimers[id]); delete pollTimers[id]; load();
      }
    }, 4000);
  }

  function openCreate() { document.getElementById('create-modal').classList.add('open'); document.getElementById('create-alert').classList.add('hidden'); }
  function closeCreate() { document.getElementById('create-modal').classList.remove('open'); }
  function closeCreds() { document.getElementById('creds-modal').classList.remove('open'); }

  async function createInstance() {
    const btn = document.getElementById('create-btn');
    btn.disabled = true; btn.textContent = 'Creating...';
    document.getElementById('create-alert').classList.add('hidden');
    try {
      const d = await api('/instances', { method: 'POST', body: JSON.stringify({
        name: document.getElementById('i-name').value,
        pg_version: document.getElementById('i-ver').value,
        pg_username: document.getElementById('i-user').value,
        pg_db_name: document.getElementById('i-db').value,
        storage_size: document.getElementById('i-storage').value,
      })});
      if (!d || d.detail) { const el = document.getElementById('create-alert'); el.textContent = (d && d.detail) || 'Failed'; el.classList.remove('hidden'); return; }
      closeCreate();
      showCreds(d);
      load();
    } finally { btn.disabled = false; btn.textContent = 'Create instance'; }
  }

  function showCreds(d) {
    document.getElementById('c-connstr').textContent = d.connection_string || '(available once running)';
    document.getElementById('c-host').textContent = d.external_host || '(provisioning...)';
    document.getElementById('c-port').textContent = String(d.external_port || '(provisioning...)');
    document.getElementById('c-user').textContent = d.pg_username;
    document.getElementById('c-pass').textContent = d.password || '(use rotate to get new credentials)';
    document.getElementById('c-db').textContent = d.pg_db_name;
    document.getElementById('creds-modal').classList.add('open');
  }

  async function del(id, name) {
    if (!confirm(`Delete "${name}"? All data will be permanently removed.`)) return;
    await api(`/instances/${id}`, { method: 'DELETE' });
    load();
  }

  async function rotate(id) {
    if (!confirm('Rotate credentials? The database will restart briefly.')) return;
    const d = await api(`/instances/${id}/credentials/rotate`, { method: 'POST' });
    if (d) showCreds({ ...d, pg_username: d.username, pg_db_name: d.database });
  }

  function copyField(id, btn) {
    const text = document.getElementById(id).textContent;
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function doLogout() {
    const rt = localStorage.getItem('refresh_token');
    if (rt) fetch('/auth/logout', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({refresh_token: rt}) }).catch(() => {});
    localStorage.clear();
    location.href = '/ui/';
  }

  load();
</script>
</body>
</html>
