version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: serverless_pg
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/serverless_pg
      K8S_IN_CLUSTER: "false"
      KUBECONFIG_PATH: /root/.kube/config
    ports:
      - "8000:8000"
    volumes:
      - ~/.kube:/root/.kube:ro
      - ./api:/app/api
      - ./dashboard:/app/dashboard

volumes:
  pgdata:
